<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>阅读 - 我的书架</title>
  <meta name="description" content="">
  
  <!-- P3修复：DNS预解析和预连接 -->
  <link rel="preconnect" href="https://github.com" crossorigin>
  <link rel="dns-prefetch" href="https://github.com">
  
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d4a574">
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="navbar">
    <h1><a href="/">📚 我的书架</a></h1>
    <nav>
      <a href="#" id="back-link">返回目录</a>
      <span id="nav-user"></span>
    </nav>
  </div>

  <!-- 阅读页两侧广告位 -->

    <div class="reader-ad-inner" id="reader-ad-left-inner"></div>
  </aside>
  <aside class="reader-ad reader-ad-right" id="reader-ad-right" style="display:none" aria-label="广告">
    <div class="reader-ad-inner" id="reader-ad-right-inner"></div>
  </aside>

  <div class="reader" id="reader-area">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div id="content" class="loading">加载中...</div>
  </div>

  <!-- 返回弹窗广告 -->
  <div class="ad-popup-overlay" id="ad-popup-overlay" style="display:none">
    <div class="ad-popup">
      <div class="ad-popup-header">
        <span class="ad-popup-label">广告</span>
        <button class="ad-popup-close" id="ad-popup-close" disabled title="请稍候...">✕ <span id="ad-popup-countdown">5</span></button>
      </div>
      <div class="ad-popup-body" id="ad-popup-body"></div>
    </div>
  </div>

  <!-- 底部工具栏 -->
  <div class="reader-bottom-bar" id="bottom-bar">
    <button class="bar-btn" id="bar-prev" title="上一章"><span class="bar-icon">◀</span>上一章</button>
    <button class="bar-btn" id="bar-toc" title="目录"><span class="bar-icon">☰</span>目录</button>
    <button class="bar-btn" id="bar-bookmark" title="书签"><span class="bar-icon" id="bookmark-icon">☆</span>书签</button>
    <button class="bar-btn" id="bar-settings" title="设置"><span class="bar-icon">⚙</span>设置</button>
    <button class="bar-btn" id="bar-immersive" title="沉浸模式"><span class="bar-icon">🔲</span>沉浸</button>
    <button class="bar-btn" id="bar-next" title="下一章"><span class="bar-icon">▶</span>下一章</button>
  </div>

  <!-- 章节目录浮层 -->
  <div class="toc-overlay" id="toc-overlay">
    <div class="toc-panel">
      <h3 id="toc-title">目录</h3>
      <ul class="toc-list" id="toc-list"></ul>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <h3>阅读设置<button class="close-btn" id="close-settings">✕</button></h3>
      <div class="setting-row">
        <span class="setting-label">主题</span>
        <div class="theme-options" id="theme-options">
          <div class="theme-dot" data-theme="light" title="默认"></div>
          <div class="theme-dot" data-theme="dark" title="夜间"></div>
          <div class="theme-dot" data-theme="green" title="护眼"></div>
          <div class="theme-dot" data-theme="sepia" title="羊皮纸"></div>
          <div class="theme-dot" data-theme="blue" title="淡蓝"></div>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">字体</span>
        <div class="font-options" id="font-options">
          <div class="font-option" data-font="'Georgia','Noto Serif SC','Source Han Serif CN',serif" style="font-family:Georgia,serif">宋体/衬线</div>
          <div class="font-option" data-font="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" style="font-family:sans-serif">黑体/无衬线</div>
          <div class="font-option" data-font="'KaiTi','STKaiti','AR PL UKai CN',serif" style="font-family:KaiTi,STKaiti,serif">楷体</div>
          <div class="font-option" data-font="'FangSong','STFangsong',serif" style="font-family:FangSong,STFangsong,serif">仿宋</div>
        </div>

      <div class="setting-row">
        <span class="setting-label">字号</span>
        <div class="slider-row">
          <span style="font-size:12px">A</span>
          <input type="range" id="font-size-slider" min="14" max="28" step="1">
          <span style="font-size:20px">A</span>
          <span class="slider-val" id="font-size-val">17px</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">行距</span>
        <div class="slider-row">
          <span style="font-size:12px">紧</span>
          <input type="range" id="line-height-slider" min="1.5" max="3" step="0.1">
          <span style="font-size:12px">松</span>
          <span class="slider-val" id="line-height-val">2.0</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">页面宽度</span>
        <div class="slider-row">
          <span style="font-size:12px">窄</span>
          <input type="range" id="width-slider" min="500" max="960" step="20">

          <span class="slider-val" id="width-val">720px</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">阅读模式</span>
        <div class="mode-options" id="mode-options">

  <button class="back-to-top has-bar" id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <!-- 翻页模式：点击区域 + 页码 -->

  <div class="pager-tap-right" id="pager-tap-right" style="display:none"></div>
  <div class="pager-indicator" id="pager-indicator"></div>
  <div class="immersive-hint" id="immersive-hint">点击中央或按 Esc 退出沉浸模式</div>

  <!-- 批注：浮动按钮（PC+移动端统一） -->
  <div id="anno-float-btn" class="anno-float-btn">📝</div>

  <!-- 批注：输入框 -->
  <div id="anno-editor" class="anno-editor" style="display:none">
    <div class="anno-editor-quote" id="anno-quote"></div>
    <div class="anno-input-wrap">
      <textarea id="anno-input" maxlength="500" placeholder="写下你的批注..."></textarea>
      <span class="anno-char-count"><span id="anno-char-num">0</span>/500</span>
    </div>
    <div class="anno-editor-footer">
      <button id="anno-vis-btn" class="anno-vis-btn" type="button">🔒 仅自己可见</button>
      <div class="anno-editor-actions">
        <button class="btn btn-sm" id="anno-cancel" type="button">取消</button>
        <button class="btn btn-sm anno-submit-btn" id="anno-submit" type="button">发表</button>
      </div>
    </div>
    <div class="anno-editor-hint">Ctrl+Enter 发表 · Esc 取消</div>
  </div>

  <!-- 批注：查看弹窗 -->
  <div id="anno-popover" class="anno-popover" style="display:none"></div>

  <!-- 底部信息条（仅在非沉浸模式显示） -->
  <footer class="reader-footer" id="reader-footer" style="text-align:center;padding:20px 16px;font-size:12px;color:var(--text-light);border-top:1px solid var(--border);margin-top:32px">
    <span id="reader-footer-text"></span>
    <span style="margin:0 6px">·</span>
    <a href="/copyright.html" style="color:var(--text-light);text-decoration:none">版权声明</a>
    <span style="margin:0 6px">·</span>
    <a href="/authors.html" style="color:var(--text-light);text-decoration:none">作者要求</a>
  </footer>

  <script>
    // ===== 认证状态 =====
    const authToken = ''; // token由HttpOnly Cookie自动携带
    let currentUser = null; // { userId, username, role }
    let canAnnotate = false; // 当前书籍是否可批注
    let currentBookId = null;
    let currentChapterId = null;

    // ===== 广告管理 =====
    let _adConfig = null;
    let _adsenseScriptLoaded = false;

    function loadAdsenseScript(client) {
      if (_adsenseScriptLoaded || !client) return;
      _adsenseScriptLoaded = true;
      const s = document.createElement('script');
      s.async = true;
      s.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${encodeURIComponent(client)}`;
      s.crossOrigin = 'anonymous';
      s.referrerPolicy = 'no-referrer-when-downgrade';
      document.head.appendChild(s);
    }

    function buildAdsenseSlot(client, slot) {
      if (!client || !slot) return '';
      return `<ins class="adsbygoogle" style="display:block;width:100%;height:100%;min-height:300px" data-ad-client="${client}" data-ad-slot="${slot}" data-ad-format="auto" data-full-width-responsive="true"></ins>`;
    }

    function pushAdsenseAd(container) {
      try {
        const ins = container.querySelector('ins.adsbygoogle');
        if (ins) {
          (window.adsbygoogle = window.adsbygoogle || []).push({});
        }
      } catch (e) { console.warn('AdSense push failed', e); }
    }

    function renderAdSlot(target, slot, customHtml, adsenseSlot) {
      if (!target) return false;
      const cfg = _adConfig;
      if (!cfg || !cfg.enabled) return false;
      const useCustom = customHtml && (cfg.mode === 'custom' || cfg.mode === 'both');
      const useAdsense = adsenseSlot && cfg.adsenseClient && (cfg.mode === 'adsense' || cfg.mode === 'both');
      if (!useCustom && !useAdsense) return false;
      let html = '';
      if (useCustom) html += customHtml;
      if (useAdsense) {
        if (useCustom) html += '<div style="height:8px"></div>';
        html += buildAdsenseSlot(cfg.adsenseClient, adsenseSlot);
      }
      target.innerHTML = html;
      if (useAdsense) {
        loadAdsenseScript(cfg.adsenseClient);
        // 延迟一帧再 push，等 script 注入完成
        setTimeout(() => pushAdsenseAd(target), 0);
      }
      return true;
    }

    async function loadAdConfig() {
      try {
        const res = await fetch('/api/settings?check=ads');
        if (!res.ok) return;
        _adConfig = await res.json();
      } catch { _adConfig = null; }
      if (!_adConfig || !_adConfig.enabled) return;

      // 渲染左右广告
      const leftSlot = document.getElementById('reader-ad-left');
      const rightSlot = document.getElementById('reader-ad-right');
      const leftInner = document.getElementById('reader-ad-left-inner');
      const rightInner = document.getElementById('reader-ad-right-inner');
      if (leftInner && renderAdSlot(leftInner, 'left', _adConfig.leftHtml, _adConfig.adsenseSlotLeft)) {
        leftSlot.style.display = '';
      }
      if (rightInner && renderAdSlot(rightInner, 'right', _adConfig.rightHtml, _adConfig.adsenseSlotRight)) {
        rightSlot.style.display = '';
      }
    }

    // ===== 返回弹窗广告 =====
    const AD_POPUP_KEY = 'lastAdPopupAt';
    function getAdPopupBody() { return document.getElementById('ad-popup-body'); }
    function showReturnPopup() {
      if (!_adConfig || !_adConfig.enabled) return;
      // 频率控制（按配置的分钟数）
      const intervalMs = (_adConfig.popupInterval || 30) * 60 * 1000;
      const last = Number(localStorage.getItem(AD_POPUP_KEY) || 0);
      if (intervalMs > 0 && Date.now() - last < intervalMs) return;

      const overlay = document.getElementById('ad-popup-overlay');
      const body = getAdPopupBody();
      const closeBtn = document.getElementById('ad-popup-close');
      const cd = document.getElementById('ad-popup-countdown');
      if (!overlay || !body) return;

      if (!renderAdSlot(body, 'popup', _adConfig.popupHtml, _adConfig.adsenseSlotPopup)) return;

      overlay.style.display = 'flex';
      localStorage.setItem(AD_POPUP_KEY, String(Date.now()));

      // 倒计时
      let remaining = Math.max(0, _adConfig.popupDelay || 5);
      closeBtn.disabled = remaining > 0;
      cd.textContent = remaining;
      if (remaining <= 0) {
        cd.textContent = '';
      } else {
        const timer = setInterval(() => {
          remaining -= 1;
          if (remaining <= 0) {
            clearInterval(timer);
            closeBtn.disabled = false;
            cd.textContent = '';
            closeBtn.title = '关闭';
          } else {
            cd.textContent = remaining;
          }
        }, 1000);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('ad-popup-overlay');
      const closeBtn = document.getElementById('ad-popup-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          if (closeBtn.disabled) return;
          overlay.style.display = 'none';
          const body = getAdPopupBody();
          if (body) body.innerHTML = '';
        });
      }
    });

    // 当用户从其他页面返回（含浏览器返回 / 标签切换）时触发
    let _wasHidden = false;
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        _wasHidden = true;
      } else if (document.visibilityState === 'visible' && _wasHidden) {
        _wasHidden = false;
        showReturnPopup();
      }
    });
    window.addEventListener('pageshow', (e) => {
      // bfcache 恢复：触发一次弹窗（仅当从其他页返回时）
      if (e.persisted) showReturnPopup();
    });

    // 启动时加载广告配置
    loadAdConfig();

    async function fetchCurrentUser() {
      const navUser = document.getElementById('nav-user');
      try {
        const res = await fetch('/api/me', { credentials: 'same-origin' });
        if (res.ok) {
          currentUser = await res.json();
          const roleMap = {
            'super_admin': { label: '超管', cls: 'super' },
            'admin': { label: '管理', cls: 'admin' },
            'demo': { label: '用户', cls: 'demo' }
          };
          const r = roleMap[currentUser.role] || { label: '用户', cls: 'demo' };
          navUser.innerHTML = `<a href="/admin.html"><span class="role-badge ${r.cls}">${r.label}</span> ${esc(currentUser.username || '')}</a> <a href="#" onclick="doLogout();return false" style="font-size:12px;color:#e74c3c;margin-left:6px">退出</a>`;
        } else {
          navUser.innerHTML = '<a href="/admin.html">管理</a>';
        }
      } catch {
        navUser.innerHTML = '<a href="/admin.html">管理</a>';
      }
    }

    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }); } catch {}
      currentUser = null;
      location.reload();
    }

    function annoApi(method, path, body) {
      const opts = { method, headers: {}, credentials: 'same-origin' };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      return fetch(path, opts);
    }

    // ===== 句子分割工具 =====
    function splitSentences(text) {
      if (!text || !text.trim()) return [];
      // 匹配句子：非句末标点的字符 + 可选的句末标点（含省略号…和连续英文句号..）
      // 🟡-4: 连续英文句号 .. / ... 视为省略号，不逐个断句
      const raw = text.match(/[^。！？…!?\n]+(?:\.{2,}|[。！？…!?\n])?/g) || [text];
      const merged = [];
      let buf = '';
      let depth = 0;
      for (const seg of raw) {
        buf += seg;
        for (const ch of seg) {
          if (ch === '\u201c' || ch === '\u300c' || ch === '\u300e') depth++;
          if (ch === '\u201d' || ch === '\u300d' || ch === '\u300f') depth = Math.max(0, depth - 1);
        }
        if (depth === 0) {
          const trimmed = buf.trim();
          if (trimmed) merged.push(trimmed);
          buf = '';
        }
      }
      if (buf.trim()) merged.push(buf.trim());
      return merged;
    }

    function snapToSentence(paragraphText, selStart, selEnd) {
      const sentences = splitSentences(paragraphText);
      let pos = 0;
      for (let i = 0; i < sentences.length; i++) {
        const s = sentences[i];
        const sStart = paragraphText.indexOf(s, pos);
        const sEnd = sStart + s.length;
        if (selStart < sEnd && selEnd > sStart) {
          return { text: s, sentIdx: i, start: sStart, end: sEnd };
        }
        pos = sEnd;
      }
      return null;
    }

    async function sentenceHash(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].slice(0, 16).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function annotationOpacity(count) {
      if (count <= 0) return 0;
      // 1人=0.3, 3人≈0.5, 10人≈0.75, 20人≈0.9（🟢-2: 改为20条达到最大浓度）
      const min = 0.3, max = 0.9;
      return Math.min(max, min + (max - min) * (Math.log10(count) / Math.log10(20)));
    }

    // ===== 阅读设置初始化 =====
    let immersiveActive = false; // 沉浸模式状态（提前声明供其他handler使用）
    const THEMES = ['light','dark','green','sepia','blue'];
    const FONTS = [
      "'Georgia','Noto Serif SC','Source Han Serif CN',serif",
      "'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif",
      "'KaiTi','STKaiti','AR PL UKai CN',serif",
      "'FangSong','STFangsong',serif"
    ];

    function loadSettings() {
      let readingMode = 'scroll';
      try { readingMode = localStorage.getItem('reading-mode') || 'scroll'; } catch {}
      return {
        theme: localStorage.getItem('theme') || 'light',
        fontSize: parseInt(localStorage.getItem('font-size')) || 17,
        lineHeight: parseFloat(localStorage.getItem('line-height')) || 2,
        fontFamily: localStorage.getItem('font-family') || FONTS[0],
        readingWidth: parseInt(localStorage.getItem('reading-width')) || 720,
        readingMode: readingMode
      };
    }

    let settings = loadSettings();

    // ===== 翻页模式变量（需在 applyAllSettings 之前声明）=====
    let pagerState = { currentPage: 0, totalPages: 1, columnWidth: 0 };
    const pagerTapLeft = document.getElementById('pager-tap-left');
    const pagerTapRight = document.getElementById('pager-tap-right');
    const pagerIndicator = document.getElementById('pager-indicator');

    applyAllSettings();

    function applyAllSettings() {
      const root = document.documentElement;
      root.setAttribute('data-theme', settings.theme);
      root.style.setProperty('--font-size', settings.fontSize + 'px');
      root.style.setProperty('--line-height', settings.lineHeight);
      root.style.setProperty('--letter-spacing', '0.02em');
      root.style.setProperty('--font-family', settings.fontFamily);
      root.style.setProperty('--reading-width', settings.readingWidth + 'px');
      applyReadingMode();
    }

    function saveSetting(key, val) {
      localStorage.setItem(key, val);
    }

    // ===== 设置面板交互 =====
    const settingsOverlay = document.getElementById('settings-overlay');
    const tocOverlay = document.getElementById('toc-overlay');

    // 主题选择
    document.getElementById('theme-options').addEventListener('click', (e) => {
      const dot = e.target.closest('.theme-dot');
      if (!dot) return;
      settings.theme = dot.dataset.theme;
      saveSetting('theme', settings.theme);
      applyAllSettings();
      updateSettingsUI();
    });

    // 字体选择
    document.getElementById('font-options').addEventListener('click', (e) => {
      const opt = e.target.closest('.font-option');
      if (!opt) return;
      settings.fontFamily = opt.dataset.font;
      saveSetting('font-family', settings.fontFamily);
      applyAllSettings();
      updateSettingsUI();
      // 字体变化后需要等渲染再重新分页
      if (settings.readingMode === 'pager') {
        requestAnimationFrame(() => { requestAnimationFrame(() => { pagerRecalc(); }); });
      }
    });

    // 防抖工具函数（翻页模式滑块用）
    let _pagerDebounceTimer = null;
    function debouncedPagerRecalc() {
      if (_pagerDebounceTimer) clearTimeout(_pagerDebounceTimer);
      _pagerDebounceTimer = setTimeout(pagerRecalc, 100);
    }

    // 字号滑块
    document.getElementById('font-size-slider').addEventListener('input', (e) => {
      settings.fontSize = parseInt(e.target.value);
      saveSetting('font-size', settings.fontSize);
      document.getElementById('font-size-val').textContent = settings.fontSize + 'px';
      applyAllSettings();
      if (settings.readingMode === 'pager') debouncedPagerRecalc();
    });

    // 行距滑块
    document.getElementById('line-height-slider').addEventListener('input', (e) => {
      settings.lineHeight = parseFloat(e.target.value);
      saveSetting('line-height', settings.lineHeight);
      document.getElementById('line-height-val').textContent = settings.lineHeight.toFixed(1);
      applyAllSettings();
      if (settings.readingMode === 'pager') debouncedPagerRecalc();
    });

    // 页面宽度滑块
    document.getElementById('width-slider').addEventListener('input', (e) => {
      settings.readingWidth = parseInt(e.target.value);
      saveSetting('reading-width', settings.readingWidth);
      document.getElementById('width-val').textContent = settings.readingWidth + 'px';
      applyAllSettings();
      if (settings.readingMode === 'pager') debouncedPagerRecalc();
    });

    // 阅读模式切换
    document.getElementById('mode-options').addEventListener('click', (e) => {
      const opt = e.target.closest('.mode-option');
      if (!opt) return;
      const newMode = opt.dataset.mode;
      if (newMode === settings.readingMode) return;
      settings.readingMode = newMode;
      saveSetting('reading-mode', newMode);
      applyAllSettings();
      updateSettingsUI();
    });

    function updateSettingsUI() {
      document.querySelectorAll('.theme-dot').forEach(d => {
        d.classList.toggle('active', d.dataset.theme === settings.theme);
      });
      document.querySelectorAll('.font-option').forEach(o => {
        o.classList.toggle('active', o.dataset.font === settings.fontFamily);
      });
      document.getElementById('font-size-slider').value = settings.fontSize;
      document.getElementById('font-size-val').textContent = settings.fontSize + 'px';
      document.getElementById('line-height-slider').value = settings.lineHeight;
      document.getElementById('line-height-val').textContent = settings.lineHeight.toFixed(1);
      document.getElementById('width-slider').value = settings.readingWidth;
      document.getElementById('width-val').textContent = settings.readingWidth + 'px';
      document.querySelectorAll('.mode-option').forEach(o => {
        o.classList.toggle('active', o.dataset.mode === settings.readingMode);
      });
    }

    // 打开/关闭设置
    document.getElementById('bar-settings').addEventListener('click', () => {
      updateSettingsUI();
      settingsOverlay.classList.add('active');
    });
    document.getElementById('close-settings').addEventListener('click', () => {
      settingsOverlay.classList.remove('active');
    });
    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) settingsOverlay.classList.remove('active');
    });

    // 打开/关闭目录
    document.getElementById('bar-toc').addEventListener('click', () => {
      tocOverlay.classList.add('active');
      // 滚动到当前章节
      const cur = document.querySelector('.toc-list a.current');
      if (cur) cur.scrollIntoView({ block: 'center' });
    });
    tocOverlay.addEventListener('click', (e) => {
      if (e.target === tocOverlay) tocOverlay.classList.remove('active');
    });

    // ===== 翻页模式引擎 =====

    function applyReadingMode() {
      const isPager = settings.readingMode === 'pager';
      document.body.classList.toggle('pager-mode', isPager);
      pagerTapLeft.style.display = isPager ? 'block' : 'none';
      pagerTapRight.style.display = isPager ? 'block' : 'none';
      if (isPager) {
        pagerRecalc();
      } else {
        // 切回滚动模式：清除column样式和transform
        const content = document.querySelector('.reader-content');
        if (content) {
          // 记住当前阅读比例
          const ratio = pagerState.totalPages > 1 ? pagerState.currentPage / (pagerState.totalPages - 1) : 0;
          content.style.transition = 'none';
          content.style.transform = '';
          content.style.height = '';
          content.style.columnWidth = '';
          content.style.columnGap = '';
          content.offsetHeight; // force reflow
          content.style.transition = '';
          // 恢复滚动位置
          if (ratio > 0) {
            requestAnimationFrame(() => {
              const h = document.documentElement.scrollHeight - window.innerHeight;
              if (h > 0) window.scrollTo(0, h * ratio);
            });
          }
        }
        pagerIndicator.style.display = 'none';
      }
    }

    function pagerRecalc() {
      if (settings.readingMode !== 'pager') return;
      const content = document.querySelector('.reader-content');
      if (!content) return;
      // 保存当前阅读比例
      const oldRatio = pagerState.totalPages > 1 ? pagerState.currentPage / (pagerState.totalPages - 1) : 0;
      // 获取容器可用高度
      const reader = document.getElementById('reader-area');
      const readerRect = reader.getBoundingClientRect();
      const titleEl = reader.querySelector('h2');
      const titleH = titleEl ? titleEl.offsetHeight + 16 : 0;
      const availH = readerRect.height - titleH;
      if (availH <= 0) return;
      const colW = readerRect.width;
      pagerState.columnWidth = colW;
      // 批量设置样式，只触发一次 reflow
      content.style.transition = 'none';
      content.style.transform = 'translateX(0)';
      content.style.height = availH + 'px';
      content.style.columnWidth = colW + 'px';
      content.style.columnGap = colW + 'px';
      // 单次强制 reflow 获取 scrollWidth
      const scrollW = content.scrollWidth;
      // 优化页码计算：使用更精确的公式
      // 每页宽度 = columnWidth + columnGap = colW * 2
      const pageWidth = colW * 2;
      if (scrollW <= colW) {
        pagerState.totalPages = 1;
      } else {
        // 使用 ceil 向上取整，确保最后一页也能显示
        pagerState.totalPages = Math.ceil(scrollW / pageWidth);
      }
      pagerState.totalPages = Math.max(1, pagerState.totalPages);
      // 恢复到相近的页码
      if (pagerState.totalPages > 1) {
        pagerState.currentPage = Math.min(Math.round(oldRatio * (pagerState.totalPages - 1)), pagerState.totalPages - 1);
      } else {
        pagerState.currentPage = 0;
      }
      pagerState.currentPage = Math.max(0, pagerState.currentPage);
      pagerGoTo(pagerState.currentPage, false);
    }

    function pagerGoTo(page, animate) {
      const content = document.querySelector('.reader-content');
      if (!content) return;
      page = Math.max(0, Math.min(page, pagerState.totalPages - 1));
      pagerState.currentPage = page;
      const offset = page * pagerState.columnWidth * 2;
      if (animate === false) {
        content.style.transition = 'none';
      } else {
        content.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      }
      content.style.transform = 'translateX(-' + offset + 'px)';
      if (animate === false) {
        // force reflow then restore transition
        content.offsetHeight;
        content.style.transition = '';
      }
      pagerUpdateIndicator();
      // 保存进度（用页码比例模拟scrollPct）
      if (window._chapterMeta) {
        const m = window._chapterMeta;
        const pct = pagerState.totalPages > 1 ? page / (pagerState.totalPages - 1) : 0;
        try {
          const progress = {
            chapterId: m.chapterId, chapterTitle: m.chapterTitle,
            bookTitle: m.bookTitle, bookId: m.bookId,
            scrollPct: pct, time: Date.now()
          };
          localStorage.setItem('reading_' + m.bookId, JSON.stringify(progress));
        } catch {}
      }
    }

    function pagerUpdateIndicator() {
      pagerIndicator.textContent = (pagerState.currentPage + 1) + ' / ' + pagerState.totalPages;
    }

    function pagerNext() {
      if (pagerState.currentPage < pagerState.totalPages - 1) {
        pagerGoTo(pagerState.currentPage + 1, true);
      } else if (nextUrl) {
        location.href = nextUrl;
      }
    }

    function pagerPrev() {
      if (pagerState.currentPage > 0) {
        pagerGoTo(pagerState.currentPage - 1, true);
      } else if (prevUrl) {
        location.href = prevUrl;
      }
    }

    // 翻页点击区域（有选区时不翻页，让批注交互优先）
    pagerTapLeft.addEventListener('click', (e) => {
      const sel = window.getSelection();
      if (sel && !sel.isCollapsed) return; // 有选区时不翻页
      e.stopPropagation(); pagerPrev();
    });
    pagerTapRight.addEventListener('click', (e) => {
      const sel = window.getSelection();
      if (sel && !sel.isCollapsed) return;
      e.stopPropagation(); pagerNext();
    });

    // 触摸滑动翻页
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    document.addEventListener('touchstart', (e) => {
      if (settings.readingMode !== 'pager') return;
      if (e.target.closest('.settings-panel') || e.target.closest('.toc-panel') || e.target.closest('.reader-bottom-bar')) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (settings.readingMode !== 'pager') return;
      if (e.target.closest('.settings-panel') || e.target.closest('.toc-panel') || e.target.closest('.reader-bottom-bar')) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const dt = Date.now() - touchStartTime;
      // 水平滑动距离>50px，且水平>垂直，且时间<500ms
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) && dt < 500) {
        if (dx < 0) pagerNext();
        else pagerPrev();
      }
    }, { passive: true });

    // resize时重新计算
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      if (settings.readingMode !== 'pager') return;
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(pagerRecalc, 200);
    });

    // ===== 底部工具栏显示/隐藏 =====
    const bottomBar = document.getElementById('bottom-bar');
    let barVisible = true;
    bottomBar.classList.add('visible');

    document.getElementById('reader-area').addEventListener('click', (e) => {
      if (immersiveActive) return; // 沉浸模式下由专门的handler处理
      if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.reader-nav')) return;
      // 翻页模式下，中间区域点击切换工具栏（左右区域由tap zone处理）
      if (settings.readingMode === 'pager') {
        const x = e.clientX;
        const w = window.innerWidth;
        if (x < w * 0.35 || x > w * 0.65) return; // 左右区域不处理
      }
      barVisible = !barVisible;
      bottomBar.classList.toggle('visible', barVisible);
    });

    // ===== 进度条 + 滚动位置记忆 =====
    // P2修复：优化进度保存频率，使用节流而非防抖
    // 节流确保定期保存，防抖可能导致长时间不保存
    let scrollSaveTimer = null;
    let lastSaveTime = 0;
    const SCROLL_SAVE_INTERVAL = 2000; // 节流间隔：2秒保存一次，平衡性能和体验
    
    window.addEventListener('scroll', () => {
      if (settings.readingMode === 'pager') return;
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const pct = h > 0 ? (window.scrollY / h * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('back-top').classList.toggle('visible', window.scrollY > 400);

      // 节流保存滚动位置：确保每2秒最多保存一次
      const now = Date.now();
      if (now - lastSaveTime >= SCROLL_SAVE_INTERVAL) {
        // 立即保存并更新时间戳
        saveScrollPosition();
        lastSaveTime = now;
      } else {
        // 在节流间隔内，设置定时器确保最终会保存
        if (scrollSaveTimer) clearTimeout(scrollSaveTimer);
        scrollSaveTimer = setTimeout(() => {
          saveScrollPosition();
          lastSaveTime = Date.now();
        }, SCROLL_SAVE_INTERVAL - (now - lastSaveTime));
      }
    });

    function saveScrollPosition() {
      if (!window._chapterMeta) return;
      if (settings.readingMode === 'pager') return; // pager模式在pagerGoTo中保存
      const m = window._chapterMeta;
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const pct = h > 0 ? (window.scrollY / h) : 0;
      const progress = {
        chapterId: m.chapterId, chapterTitle: m.chapterTitle,
        bookTitle: m.bookTitle, bookId: m.bookId,
        scrollPct: pct, time: Date.now()
      };
      localStorage.setItem(`reading_${m.bookId}`, JSON.stringify(progress));
    }

    // ===== 键盘快捷键 =====
    let prevUrl = null, nextUrl = null, backUrl = null;
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft') {
        if (settings.readingMode === 'pager') pagerPrev();
        else if (prevUrl) location.href = prevUrl;
        return;
      }
      if (e.key === 'ArrowRight') {
        if (settings.readingMode === 'pager') pagerNext();
        else if (nextUrl) location.href = nextUrl;
        return;
      }
      if (e.key === 'Escape') {
        if (immersiveActive) { exitImmersive(); return; }
        if (document.fullscreenElement) { document.exitFullscreen(); return; }
        if (settingsOverlay.classList.contains('active')) settingsOverlay.classList.remove('active');
        else if (tocOverlay.classList.contains('active')) tocOverlay.classList.remove('active');
        else if (backUrl) location.href = backUrl;
      }
      if (e.key === 'i' || e.key === 'I') {
        toggleImmersive();
        return;
      }
      if (e.key === 't' || e.key === 'T') {
        const idx = THEMES.indexOf(settings.theme);
        settings.theme = THEMES[(idx + 1) % THEMES.length];
        saveSetting('theme', settings.theme);
        applyAllSettings(); updateSettingsUI();
      }
      if (e.key === 'f' || e.key === 'F') {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen().catch(() => {});
      }
      if (e.key === 's' || e.key === 'S') {
        settingsOverlay.classList.toggle('active');
      }
    });

    // ===== 加载站点设置 =====
    fetch('/api/settings').then(r => r.json()).then(d => {
      const s = d.settings || {};
      if (s.site_name) document.querySelector('.navbar h1 a').textContent = '📚 ' + s.site_name;
      // 页脚
      if (s.footer_text) {
        const el = document.getElementById('reader-footer-text');
        if (el) el.textContent = s.footer_text;
      }
      // 下载功能开关（默认关闭）
      const downloadOn = s.download_enabled === true;
      ['export-btn', 'download-book-btn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = downloadOn ? '' : 'none';
      });
    }).catch(() => {});

    // ===== 加载自定义字体 =====
    fetch('/api/fonts').then(r => r.json()).then(d => {
      const fonts = d.fonts || [];
      const container = document.getElementById('font-options');
      fonts.forEach(name => {
        const familyName = 'Custom-' + name.replace(/\.woff2$/i, '');
        const face = new FontFace(familyName, `url(/api/fonts/${encodeURIComponent(name)})`);
        face.load().then(loaded => {
          document.fonts.add(loaded);
          const div = document.createElement('div');
          div.className = 'font-option';
          div.dataset.font = `'${familyName}'`;
          div.style.fontFamily = familyName;
          div.textContent = name.replace(/\.woff2$/i, '');
          container.appendChild(div);
          // 如果当前选中的就是这个字体，标记active
          if (settings.fontFamily === `'${familyName}'`) div.classList.add('active');
        }).catch(() => {}); // 加载失败静默忽略
      });
    }).catch(() => {});

    // ===== 预加载缓存 =====
    let prefetchedNext = null;

    // ===== 加载章节 =====
    const chapterId = new URLSearchParams(location.search).get('id');
    if (!chapterId || !/^\d+$/.test(chapterId)) {
      document.getElementById('content').innerHTML = '<div class="msg msg-error">无效的章节ID</div>';
    } else {
      loadChapter();
    }

    async function loadChapter() {
      const el = document.getElementById('content');
      try {
        // 检查是否有预加载缓存
        let data;
        if (prefetchedNext && prefetchedNext.chapter && String(prefetchedNext.chapter.id) === chapterId) {
          data = prefetchedNext;
          prefetchedNext = null;
        } else {
          const res = await fetch(`/api/chapters/${chapterId}`);
          if (!res.ok) throw new Error(res.status === 404 ? '章节不存在' : '加载失败');
          data = await res.json();
        }
        const c = data.chapter;

        // 存储元数据
        window._chapterMeta = {
          chapterId: c.id, chapterTitle: c.title,
          bookTitle: c.book_title, bookId: c.book_id
        };
        window._chapterData = { content: data.content, title: c.title };

        // SEO
        document.title = esc(c.title) + ' - ' + esc(c.book_title);
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.content = `${c.book_title} - ${c.title}`;

        // 面包屑
        backUrl = `/book.html?id=${c.book_id}`;
        document.getElementById('back-link').href = backUrl;
        document.getElementById('breadcrumb').innerHTML =
          `<a href="/">书架</a><span>›</span><a href="/book.html?id=${c.book_id}">${esc(c.book_title)}</a><span>›</span>${esc(c.title)}`;

        // 正文 — 按段落渲染为 <p>（批注系统依赖段落索引）
        const contentDiv = document.createElement('div');
        contentDiv.className = 'reader-content';
        const rawParagraphs = data.content.split('\n');
        rawParagraphs.forEach((text, idx) => {
          if (!text.trim()) return; // 跳过空行，但保留原始索引
          const p = document.createElement('p');
          p.textContent = text;
          p.dataset.paraIdx = idx;
          contentDiv.appendChild(p);
        });
        currentBookId = c.book_id;
        currentChapterId = c.id;

        // 导航
        prevUrl = data.prevChapter ? `/read.html?id=${data.prevChapter.id}` : null;
        nextUrl = data.nextChapter ? `/read.html?id=${data.nextChapter.id}` : null;

        const nav = document.createElement('div');
        nav.className = 'reader-nav';
        nav.innerHTML = `
          ${prevUrl ? `<a href="${prevUrl}">← ${esc(data.prevChapter.title)}</a>` : '<span class="disabled">已是第一章</span>'}
          <a href="/book.html?id=${c.book_id}">目录</a>
          <a href="#" id="export-btn" style="font-size:13px">导出TXT</a>
          <a href="#" id="download-book-btn" style="font-size:13px">📥 缓存全书</a>
          ${nextUrl ? `<a href="${nextUrl}">${esc(data.nextChapter.title)} →</a>` : '<span class="disabled">已是最新章</span>'}
        `;

        el.innerHTML = `<h2>${esc(c.title)}</h2>`;
        el.appendChild(contentDiv);
        el.appendChild(nav);

        // 导出按钮事件
        document.getElementById('export-btn').addEventListener('click', (e) => { e.preventDefault(); exportThis(); });

        // 缓存全书按钮
        document.getElementById('download-book-btn').addEventListener('click', async (e) => {
          e.preventDefault();
          const btn = e.target;
          try {
            btn.textContent = '📥 获取目录...';
            const bRes = await fetch(`/api/books/${c.book_id}`);
            const bData = await bRes.json();
            const chs = bData.chapters || [];
            if (chs.length === 0) { btn.textContent = '📥 无章节'; return; }
            let done = 0;
            for (const ch of chs) {
              await fetch(`/api/chapters/${ch.id}`);
              done++;
              btn.textContent = `📥 ${done}/${chs.length}`;
            }
            btn.textContent = '✅ 缓存完成';
          } catch (err) {
            btn.textContent = '❌ 缓存失败';
          }
        });

        // 底部工具栏按钮
        document.getElementById('bar-prev').onclick = () => { if (prevUrl) location.href = prevUrl; };
        document.getElementById('bar-next').onclick = () => { if (nextUrl) location.href = nextUrl; };
        document.getElementById('bar-prev').style.opacity = prevUrl ? '1' : '0.3';
        document.getElementById('bar-next').style.opacity = nextUrl ? '1' : '0.3';

        // 保存阅读进度
        saveScrollPosition();

        // 阅读统计：记录章节字数和阅读天数
        trackReadingStats(c.id, data.content.length);

        // 更新书签图标
        updateBookmarkIcon();

        // 恢复滚动位置
        restoreScrollPosition(c.book_id, c.id);

        // 加载目录
        loadTOC(c.book_id, c.id);

        // 预加载下一章
        if (data.nextChapter) {
          setTimeout(() => {
            fetch(`/api/chapters/${data.nextChapter.id}`)
              .then(r => r.json())
              .then(d => { prefetchedNext = d; })
              .catch(() => {});
          }, 2000);
        }

        // 初始化批注系统
        initAnnotations();
      } catch (e) {
        el.innerHTML = `<div class="msg msg-error">${esc(e.message)}</div>`;
      }
    }

    function restoreScrollPosition(bookId, currentChapterId) {
      try {
        const saved = JSON.parse(localStorage.getItem(`reading_${bookId}`));
        if (saved && saved.chapterId === currentChapterId && saved.scrollPct > 0) {
          if (settings.readingMode === 'pager') {
            // 翻页模式：延迟到分页计算后恢复
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                pagerRecalc();
                const page = Math.round(saved.scrollPct * (pagerState.totalPages - 1));
                pagerGoTo(page, false);
              });
            });
          } else {
            // 滚动模式：恢复滚动位置
            requestAnimationFrame(() => {
              const h = document.documentElement.scrollHeight - window.innerHeight;
              if (h > 0) window.scrollTo(0, h * saved.scrollPct);
            });
          }
        } else if (settings.readingMode === 'pager') {
          // 没有保存的位置，但需要初始化分页
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { pagerRecalc(); });
          });
        }
      } catch {
        if (settings.readingMode === 'pager') {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { pagerRecalc(); });
          });
        }
      }
    }

    async function loadTOC(bookId, currentChapterId) {
      try {
        const res = await fetch(`/api/books/${bookId}`);
        const data = await res.json();
        const list = document.getElementById('toc-list');
        document.getElementById('toc-title').textContent = data.book.title;
        list.innerHTML = (data.chapters || []).map(ch =>
          `<li><a href="/read.html?id=${ch.id}" class="${ch.id === currentChapterId ? 'current' : ''}">${esc(ch.title)}</a></li>`
        ).join('');
      } catch {}
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function exportThis() {
      if (!window._chapterData) return;
      const BOM = '\uFEFF';
      const blob = new Blob([BOM + window._chapterData.content], {type:'text/plain;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (window._chapterData.title + '.txt').replace(/[<>:"/\\|?*]/g, '_');
      a.click();
      URL.revokeObjectURL(url);
    }

    // ===== 书签功能 =====
    function getBookmarks(bookId) {
      try { return JSON.parse(localStorage.getItem(`bookmarks_${bookId}`)) || []; }
      catch { return []; }
    }
    function saveBookmarks(bookId, bookmarks) {
      localStorage.setItem(`bookmarks_${bookId}`, JSON.stringify(bookmarks));
    }
    function isBookmarked() {
      if (!window._chapterMeta) return false;
      const m = window._chapterMeta;
      const bms = getBookmarks(m.bookId);
      return bms.some(b => b.chapterId === m.chapterId);
    }
    function updateBookmarkIcon() {
      document.getElementById('bookmark-icon').textContent = isBookmarked() ? '★' : '☆';
    }
    function toggleBookmark() {
      if (!window._chapterMeta) return;
      const m = window._chapterMeta;
      let bms = getBookmarks(m.bookId);
      const idx = bms.findIndex(b => b.chapterId === m.chapterId);
      if (idx >= 0) {
        bms.splice(idx, 1);
      } else {
        const h = document.documentElement.scrollHeight - window.innerHeight;
        const pct = h > 0 ? (window.scrollY / h) : 0;
        bms.push({
          chapterId: m.chapterId, chapterTitle: m.chapterTitle,
          scrollPct: pct, time: Date.now()
        });
      }
      saveBookmarks(m.bookId, bms);
      updateBookmarkIcon();
    }
    document.getElementById('bar-bookmark').addEventListener('click', toggleBookmark);

    // ===== 阅读统计 =====
    function getReadingStats() {
      try { return JSON.parse(localStorage.getItem('readingStats')) || {}; } catch { return {}; }
    }
    function saveReadingStats(s) {
      localStorage.setItem('readingStats', JSON.stringify(s));
    }
    function trackReadingStats(chId, charCount) {
      const s = getReadingStats();
      if (!s.totalSeconds) s.totalSeconds = 0;
      if (!s.totalChars) s.totalChars = 0;
      if (!Array.isArray(s.readChapterIds)) s.readChapterIds = [];
      if (!Array.isArray(s.days)) s.days = [];
      // 记录今天
      const today = new Date().toISOString().slice(0, 10);
      if (!s.days.includes(today)) s.days.push(today);
      // 首次阅读该章节才累加字数
      if (!s.readChapterIds.includes(chId)) {
        s.readChapterIds.push(chId);
        s.totalChars += charCount;

      saveReadingStats(s);

    // 每30秒累加阅读时长

    // ===== 批注系统 =====
    let annoState = {
      paraIdx: null, sentIdx: null, sentText: '', sentHash: '',
      visibility: 'private', editing: false,
      // 保存选区状态，防止点击按钮时选区丢失
      savedRange: null,
      savedSelectionText: ''
    };

    // 保存选区状态（在选区变化时调用）
    function saveSelectionState(sel) {
      if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
        annoState.savedRange = null;
        annoState.savedSelectionText = '';
        return;
      }
      try {
        const range = sel.getRangeAt(0);
        // 克隆 Range 以防止选区清除后数据丢失
        annoState.savedRange = range.cloneRange();
        annoState.savedSelectionText = sel.toString();
      } catch (e) {
        console.warn('[anno] saveSelectionState error:', e);
        annoState.savedRange = null;
        annoState.savedSelectionText = '';
      }
    }

    // 恢复选区状态
    function restoreSelectionState() {
      if (!annoState.savedRange) return false;
      try {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(annoState.savedRange);
        return true;
      } catch (e) {
        console.warn('[anno] restoreSelectionState error:', e);
        return false;
      }
    }

    // 清除保存的选区状态
    function clearSavedSelectionState() {
      annoState.savedRange = null;
      annoState.savedSelectionText = '';
    }

    async function initAnnotations() {
      await fetchCurrentUser();
      // 检查书籍是否允许批注
      if (currentBookId) {

          const res = await fetch(`/api/books/${currentBookId}`);

    // --- 下划线渲染 ---
    function getTextNodes(el) {
      const nodes = [];
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      let node;
      while ((node = walker.nextNode())) nodes.push(node);
      return nodes;
    }

    function findTextInParagraph(p, targetText, sentIdx) {
      // 用 splitSentences 精确定位偏移量，避免 indexOf 重复文本问题（🟡-5 修复）
      const fullText = p.textContent;
      const sentences = splitSentences(fullText);
      let start = 0;
      for (let i = 0; i < sentences.length && i < sentIdx; i++) {
        const idx = fullText.indexOf(sentences[i], start);
        if (idx >= 0) start = idx + sentences[i].length;
      }
      const exactStart = fullText.indexOf(targetText, start);
      if (exactStart < 0) return null;
      const end = exactStart + targetText.length;

      const textNodes = getTextNodes(p);
      let charCount = 0;
      let startNode = null, startOffset = 0, endNode = null, endOffset = 0;
      for (const tn of textNodes) {
        const tnEnd = charCount + tn.length;
        if (!startNode && exactStart < tnEnd) {
          startNode = tn;
          startOffset = exactStart - charCount;
        }
        if (end <= tnEnd) {
          endNode = tn;
          endOffset = end - charCount;
          break;
        }
        charCount = tnEnd;
      }
      if (!startNode || !endNode) return null;
      const range = document.createRange();
      range.setStart(startNode, startOffset);
      range.setEnd(endNode, endOffset);
      return range;
    }

    // 安全高亮：处理 range 跨越已有 span 节点的情况（🔴-2 修复）
    function highlightRange(range, span) {
      // 如果 start 和 end 在同一个文本节点，surroundContents 安全
      if (range.startContainer === range.endContainer && range.startContainer.nodeType === 3) {
        range.surroundContents(span);
        return span;
      }
      // 跨节点：提取内容再包裹
      try {
        const fragment = range.extractContents();
        span.appendChild(fragment);
        range.insertNode(span);
        return span;
      } catch {
        return null;
      }
    }

    async function renderAnnotationUnderlines() {
      if (!currentChapterId) return;
      try {
        const res = await annoApi('GET', `/api/annotations/summary?chapterId=${currentChapterId}`);
        if (!res.ok) return;
        const { sentences } = await res.json();
        if (!sentences || !sentences.length) return;

        const paragraphs = document.querySelectorAll('.reader-content p[data-para-idx]');
        const paraMap = {};
        paragraphs.forEach(p => { paraMap[p.dataset.paraIdx] = p; });

        for (const s of sentences) {
          const p = paraMap[s.para_idx];
          if (!p) continue;
          const sents = splitSentences(p.textContent);
          if (!sents[s.sent_idx]) continue;

          const range = findTextInParagraph(p, sents[s.sent_idx], s.sent_idx);
          if (!range) continue;

          const span = document.createElement('span');
          span.className = 'annotated';
          span.dataset.paraIdx = s.para_idx;
          span.dataset.sentIdx = s.sent_idx;

          const hasPublic = s.public_count > 0;
          const hasPrivate = s.private_count > 0;
          if (hasPublic && hasPrivate) {
            span.classList.add('has-both');
          } else if (hasPublic) {
            span.classList.add('has-public');
          } else {
            span.classList.add('private-only');
          }

          const totalVisible = s.public_count + (s.has_mine ? 1 : 0);
          span.style.setProperty('--anno-opacity', annotationOpacity(totalVisible));

          span.addEventListener('click', (e) => {
            e.stopPropagation();
            showAnnotationPopover(s.para_idx, s.sent_idx, span);
          });

          highlightRange(range, span);
        }

        // 翻页模式下重新计算分页
        if (settings.readingMode === 'pager') {
          requestAnimationFrame(() => requestAnimationFrame(() => pagerRecalc()));
        }
      } catch {}
    }

    // --- 查看批注弹窗 ---
    let popoverSort = 'latest';
    let popoverContext = null; // { paraIdx, sentIdx, anchorEl }

    async function showAnnotationPopover(paraIdx, sentIdx, anchorEl, sort = popoverSort) {
      const popover = document.getElementById('anno-popover');
      popoverContext = { paraIdx, sentIdx, anchorEl };
      popoverSort = sort;

      try {
        const res = await annoApi('GET',
          `/api/annotations?chapterId=${currentChapterId}&paraIdx=${paraIdx}&sentIdx=${sentIdx}&sort=${sort}`);
        if (!res.ok) return;
        const { annotations } = await res.json();

        if (!annotations || !annotations.length) {
          popover.style.display = 'none';
          return;
        }

        const sortBtns = `
          <div class="anno-popover-header">
            <div class="anno-sort-tabs">
              <button class="anno-sort-tab ${sort === 'latest' ? 'active' : ''}" data-sort="latest">最新</button>
              <button class="anno-sort-tab ${sort === 'hot' ? 'active' : ''}" data-sort="hot">最热</button>
            </div>
          </div>
        `;

        const items = annotations.map(a => {
          const content = a.content || '';
          const isLong = content.length > 100;
          const displayContent = isLong ? content.slice(0, 100) : content;
          const likeCount = a.like_count || 0;
          const liked = !!a.liked;

          return `
            <div class="anno-popover-item" data-id="${a.id}">
              <div class="anno-popover-content ${isLong ? 'truncated' : ''}" data-full="${esc(content)}">${esc(displayContent)}${isLong ? '<span class="anno-expand">...展开</span>' : ''}</div>
              <div class="anno-popover-footer">
                <div class="anno-popover-meta">
                  ${esc(a.username || '匿名')} · ${timeAgo(a.created_at)}
                  ${a.visibility === 'private' ? ' · 🔒' : ''}
                </div>
                <div class="anno-popover-actions">
                  <button class="anno-like-btn ${liked ? 'liked' : ''}" data-id="${a.id}">
                    <span class="like-icon">${liked ? '❤️' : '🤍'}</span>
                    <span class="like-count">${likeCount || ''}</span>
                  </button>
                  ${a.is_mine ? `<button class="btn-link anno-delete-btn" data-id="${a.id}">删除</button>` : `<button class="btn-link anno-report-btn" data-id="${a.id}">举报</button>`}
                </div>
              </div>
            </div>
          `;
        }).join('');

        popover.innerHTML = sortBtns + '<div class="anno-popover-list">' + items + '</div>';

        // 定位
        const rect = anchorEl.getBoundingClientRect();
        popover.style.display = 'block';
        const popRect = popover.getBoundingClientRect();
        let top = rect.bottom + 8;
        let left = rect.left + rect.width / 2 - popRect.width / 2;
        if (top + popRect.height > window.innerHeight) top = rect.top - popRect.height - 8;
        if (left < 8) left = 8;
        if (left + popRect.width > window.innerWidth - 8) left = window.innerWidth - popRect.width - 8;
        popover.style.top = top + 'px';
        popover.style.left = left + 'px';

        // 绑定事件
        popover.querySelectorAll('.anno-sort-tab').forEach(btn => {
          btn.onclick = () => showAnnotationPopover(paraIdx, sentIdx, anchorEl, btn.dataset.sort);
        });
        popover.querySelectorAll('.anno-expand').forEach(span => {
          span.onclick = (e) => {
            e.stopPropagation();
            const contentEl = span.parentElement;
            contentEl.textContent = contentEl.dataset.full;
            contentEl.classList.remove('truncated');
          };
        });
        popover.querySelectorAll('.anno-like-btn').forEach(btn => {
          btn.onclick = (e) => {
            e.stopPropagation();
            toggleLike(Number(btn.dataset.id), btn);
          };
        });
        popover.querySelectorAll('.anno-delete-btn').forEach(btn => {
          btn.onclick = () => deleteAnnotation(Number(btn.dataset.id));
        });
        popover.querySelectorAll('.anno-report-btn').forEach(btn => {
          btn.onclick = () => showReportDialog(Number(btn.dataset.id));
        });
      } catch {}
    }

    async function toggleLike(annoId, btn) {
      if (!currentUser) {
        alert('请先登录');
        return;
      }
      try {
        const res = await annoApi('POST', `/api/annotations/${annoId}/like`);
        if (!res.ok) return;
        const { liked } = await res.json();
        const icon = btn.querySelector('.like-icon');
        const count = btn.querySelector('.like-count');
        const currentCount = parseInt(count.textContent) || 0;
        
        if (liked) {
          btn.classList.add('liked');
          icon.textContent = '❤️';
          count.textContent = currentCount + 1 || '1';
        } else {
          btn.classList.remove('liked');
          icon.textContent = '🤍';
          count.textContent = currentCount > 1 ? currentCount - 1 : '';
        }
      } catch {}
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr + 'Z').getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return '刚刚';
      if (m < 60) return m + '分钟前';
      const h = Math.floor(m / 60);
      if (h < 24) return h + '小时前';
      const d = Math.floor(h / 24);
      if (d < 30) return d + '天前';
      return new Date(dateStr).toLocaleDateString('zh-CN');
    }

    async function deleteAnnotation(id) {
      if (!confirm('确定删除这条批注？')) return;
      try {
        const res = await annoApi('DELETE', `/api/annotations/${id}`);
        if (res.ok) {
          document.getElementById('anno-popover').style.display = 'none';
          await refreshAnnotations();
        } else {
          alert('删除失败');
        }
      } catch {
        alert('网络错误');
      }
    }

    function showReportDialog(annoId) {
      const reason = prompt('请输入举报理由（至少10个字）：');
      if (!reason) return;
      if (reason.trim().length < 10) {
        alert('举报理由至少10个字');
        return;
      }
      submitReport(annoId, reason.trim());
    }

    async function submitReport(annoId, reason) {
      try {
        const res = await annoApi('POST', '/api/reports', { annotationId: annoId, reason });
        if (res.ok) {
          alert('举报已提交，感谢反馈');
          document.getElementById('anno-popover').style.display = 'none';
        } else {
          const data = await res.json().catch(() => ({}));
          alert(data.error || '举报失败');

      }

    // 清除所有下划线并重新渲染（🟡-3: 提取为公共函数 + 🟢-7: 错误处理）
    async function refreshAnnotations() {
      document.querySelectorAll('.annotated').forEach(el => {
        const parent = el.parentNode;
        while (el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
      });
      // 合并相邻文本节点，防止碎片化
      document.querySelectorAll('.reader-content p').forEach(p => p.normalize());
      await renderAnnotationUnderlines();
    }

    // --- 交互事件绑定 ---
    function bindAnnotationEvents() {
      const readerContent = document.querySelector('.reader-content');
      if (!readerContent) return;

      // PC + 移动端统一用 selectionchange + 浮动按钮
      const selHandler = debounceSelection();
      document.addEventListener('selectionchange', selHandler);

      // 阅读区域拦截右键菜单（有选区时阻止浏览器默认菜单）
      readerContent.addEventListener('contextmenu', (e) => {
        const sel = window.getSelection();
        if (sel && !sel.isCollapsed) e.preventDefault();
      });

      // mouseup 后：立即检测选区并显示浮动按钮
      readerContent.addEventListener('mouseup', (e) => {
        console.log('[anno] mouseup on readerContent', { target: e.target.id || e.target.className });
        if (e.target.closest('#anno-float-btn')) return;
        setTimeout(() => {
          const sel = window.getSelection();
          if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
          showFloatBtnForSelection(sel);
        }, 50);
      });

      // 翻页模式下 tap 区域会拦截 mouseup，用 document 级别 fallback
      document.addEventListener('mouseup', (e) => {
        if (settings.readingMode !== 'pager') return;
        if (e.target.closest('#anno-float-btn') || e.target.closest('#anno-editor')) return;
        setTimeout(() => {
          const sel = window.getSelection();
          if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
          const anchorEl = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
          if (!anchorEl?.closest('.reader-content')) return;
          showFloatBtnForSelection(sel);
        }, 50);
      });

      // 浮动按钮：mousedown 直接触发编辑器（比 click 更可靠）
      const floatBtn = document.getElementById('anno-float-btn');
      floatBtn.addEventListener('mousedown', (e) => {
        console.log('[anno] floatBtn mousedown fired', { annoState: {...annoState} });
        e.preventDefault();
        e.stopPropagation();
        openAnnotationEditor();
      });

      // 编辑器按钮
      document.getElementById('anno-vis-btn').addEventListener('click', toggleVisibility);
      document.getElementById('anno-cancel').addEventListener('click', closeAnnotationEditor);
      document.getElementById('anno-submit').addEventListener('click', submitAnnotation);

      // 字数统计
      const annoInput = document.getElementById('anno-input');
      annoInput.addEventListener('input', () => {
        const len = annoInput.value.length;
        document.getElementById('anno-char-num').textContent = len;
        document.getElementById('anno-char-num').parentElement.classList.toggle('warn', len > 450);
      });

      // Ctrl+Enter 提交
      annoInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          submitAnnotation();
        }
      });

      // 点击外部关闭弹窗
      document.addEventListener('click', (e) => {
        const popover = document.getElementById('anno-popover');
        if (popover.style.display !== 'none' && !popover.contains(e.target) && !e.target.closest('.annotated')) {
          popover.style.display = 'none';
        }
        // 点击非浮动按钮且非选区时隐藏浮动按钮
        const floatBtn = document.getElementById('anno-float-btn');
        if (floatBtn.classList.contains('visible') && !floatBtn.contains(e.target)) {
          const sel = window.getSelection();
          if (!sel || sel.isCollapsed) floatBtn.classList.remove('visible');
        }
      });

      // Escape 关闭
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          document.getElementById('anno-float-btn').classList.remove('visible');
          document.getElementById('anno-popover').style.display = 'none';
          if (annoState.editing) closeAnnotationEditor();
        }
      });

      // 滚动时关闭浮动按钮（但保留保存的选区状态，以便用户仍可创建批注）
      window.addEventListener('scroll', () => {
        document.getElementById('anno-float-btn').classList.remove('visible');
        // 注意：不清除 savedRange，因为用户可能滚动后仍想创建批注
      }, { passive: true });
    }

    function debounceSelection() {
      let timer = null;
      return () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          const sel = window.getSelection();
          if (!sel || sel.isCollapsed || annoState.editing) {
            document.getElementById('anno-float-btn').classList.remove('visible');
            return;
          }
          showFloatBtnForSelection(sel);
        }, 300);
      };
    }

    function showFloatBtnForSelection(sel) {
      if (!sel || sel.isCollapsed || annoState.editing) {
        document.getElementById('anno-float-btn').classList.remove('visible');
        clearSavedSelectionState();
        return;
      }
      const anchorEl = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
      const readerContent = document.querySelector('.reader-content');
      if (!readerContent || !readerContent.contains(anchorEl)) {
        clearSavedSelectionState();
        return;
      }

      const p = anchorEl?.closest('p[data-para-idx]');
      if (!p) {
        clearSavedSelectionState();
        return;
      }

      const paraIdx = parseInt(p.dataset.paraIdx);
      const paraText = p.textContent;
      const range = sel.getRangeAt(0);
      const preRange = document.createRange();
      preRange.setStart(p, 0);
      preRange.setEnd(range.startContainer, range.startOffset);
      const selStart = preRange.toString().length;
      const selEnd = selStart + sel.toString().length;

      const snapped = snapToSentence(paraText, selStart, selEnd);
      if (!snapped) {
        clearSavedSelectionState();
        return;
      }

      // 保存选区状态，防止点击按钮时选区丢失
      saveSelectionState(sel);

      annoState.paraIdx = paraIdx;
      annoState.sentIdx = snapped.sentIdx;
      annoState.sentText = snapped.text;

      const rect = range.getBoundingClientRect();
      // 保存位置信息供编辑器使用（点击按钮时selection可能已清除）
      annoState.selRect = { left: rect.left, top: rect.top, bottom: rect.bottom, width: rect.width };
      const btn = document.getElementById('anno-float-btn');
      console.log('[anno] showing floatBtn', { paraIdx, sentIdx: snapped.sentIdx, text: snapped.text.slice(0,30) });
      btn.classList.add('visible');
      btn.style.left = (rect.left + rect.width / 2 - 18) + 'px';
      btn.style.top = (rect.top - 44) + 'px';
    }

    // --- 批注编辑器 ---
    async function openAnnotationEditor() {
      document.getElementById('anno-float-btn').classList.remove('visible');

      // 验证选区状态是否有效
      if (!annoState.sentText) {
        console.warn('[anno] sentText empty, trying to recover from saved selection');
        
        // 首先尝试从保存的选区恢复
        if (annoState.savedRange && annoState.savedSelectionText) {
          console.log('[anno] attempting to restore from saved range');
          const restored = restoreSelectionState();
          if (restored) {
            const sel = window.getSelection();
            if (sel && !sel.isCollapsed) {
              showFloatBtnForSelection(sel);
              if (!annoState.sentText) {
                alert('未能识别选中的句子，请重新选择');
                clearSavedSelectionState();
                return;
              }
              // 恢复成功，继续
            } else {
              alert('选区已失效，请重新选择要批注的文字');
              clearSavedSelectionState();
              return;
            }
          } else {
            alert('选区已失效，请重新选择要批注的文字');
            clearSavedSelectionState();
            return;
          }
        } else {
          // 尝试从当前选区恢复
          const sel = window.getSelection();
          if (sel && !sel.isCollapsed) {
            showFloatBtnForSelection(sel);
            if (!annoState.sentText) {
              alert('未能识别选中的句子，请重新选择');
              return;
            }
            // 恢复成功，继续
          } else {
            alert('请先选中一段文字');
            return;
          }
        }
      }

      // 再次验证必要字段
      if (!validateAnnotationState()) {
        alert('选区信息不完整，请重新选择要批注的文字');
        return;
      }

      try {
        annoState.editing = true;
        annoState.sentHash = await sentenceHash(annoState.sentText);

        const editor = document.getElementById('anno-editor');
        document.getElementById('anno-quote').textContent = annoState.sentText;
        document.getElementById('anno-input').value = '';
        document.getElementById('anno-char-num').textContent = '0';
        annoState.visibility = 'private';
        const visBtn = document.getElementById('anno-vis-btn');
        visBtn.textContent = '🔒 仅自己可见';
        visBtn.classList.remove('public');

        editor.style.display = 'block';
        document.getElementById('anno-input').focus();

        // PC 端定位到选区附近
        if (window.innerWidth > 768 && annoState.selRect) {
          const rect = annoState.selRect;
          editor.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 340)) + 'px';
          editor.style.top = (rect.bottom + 12) + 'px';
          editor.style.transform = 'none';
          requestAnimationFrame(() => {
            const edRect = editor.getBoundingClientRect();
            if (edRect.bottom > window.innerHeight - 8) {
              editor.style.top = (rect.top - edRect.height - 12) + 'px';
            }
          });
        } else if (window.innerWidth > 768) {
          editor.style.left = '50%';
          editor.style.top = '30%';
          editor.style.transform = 'translateX(-50%)';
        }
      } catch (e) {
        console.error('[anno] openAnnotationEditor error:', e);
        annoState.editing = false;
      }
    }

    // 验证批注状态是否有效
    function validateAnnotationState() {
      return (
        annoState.paraIdx !== null &&
        annoState.paraIdx !== undefined &&
        annoState.sentIdx !== null &&
        annoState.sentIdx !== undefined &&
        annoState.sentText &&
        annoState.sentText.trim().length > 0
      );
    }

    function closeAnnotationEditor() {
      annoState.editing = false;
      document.getElementById('anno-editor').style.display = 'none';
      // 关闭编辑器时清除保存的选区状态
      clearSavedSelectionState();
    }

    function toggleVisibility() {
      const btn = document.getElementById('anno-vis-btn');
      if (annoState.visibility === 'private') {
        annoState.visibility = 'public';
        btn.textContent = '🌐 所有人可见';
        btn.classList.add('public');
      } else {
        annoState.visibility = 'private';
        btn.textContent = '🔒 仅自己可见';
        btn.classList.remove('public');
      }
    }

    async function submitAnnotation() {
      const content = document.getElementById('anno-input').value.trim();
      if (!content) {
        alert('请输入批注内容');
        return;
      }
      if (content.length > 500) {
        alert('批注内容不能超过500字');
        return;
      }

      // 验证所有必需字段
      if (!currentChapterId) {
        alert('章节信息缺失，请刷新页面后重试');
        return;
      }
      if (!currentBookId) {
        alert('书籍信息缺失，请刷新页面后重试');
        return;
      }
      if (!validateAnnotationState()) {
        alert('选区信息不完整，请关闭编辑器后重新选择要批注的文字');
        return;
      }
      if (!annoState.sentHash) {
        alert('句子哈希计算失败，请重试');
        return;
      }

      const btn = document.getElementById('anno-submit');
      btn.disabled = true;
      btn.textContent = '发表中...';

      try {
        const res = await annoApi('POST', '/api/annotations', {
          chapterId: currentChapterId,
          bookId: currentBookId,
          paraIdx: annoState.paraIdx,
          sentIdx: annoState.sentIdx,
          sentHash: annoState.sentHash,
          sentText: annoState.sentText,
          content: content,
          visibility: annoState.visibility
        });

        if (res.ok) {
          closeAnnotationEditor();
          clearSavedSelectionState();
          await refreshAnnotations();
        } else {
          const err = await res.json().catch(() => ({}));
          alert(err.error || '发表失败');
        }
      } catch (e) {
        console.error('[anno] submitAnnotation error:', e);
        alert('网络错误');
      } finally {
        btn.disabled = false;
        btn.textContent = '发表';
      }
    }
  </script>
</body>
</html>
