<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>我的书架</title>
  <meta name="description" content="我的私人小说站，零成本搭建在 Cloudflare 上">
  <meta property="og:title" content="我的书架">
  <meta property="og:description" content="私人小说站，零成本搭建在 Cloudflare 上">
  
  <!-- P3修复：DNS预解析和预连接 - 优化资源加载性能 -->
  <link rel="preconnect" href="https://github.com" crossorigin>
  <link rel="dns-prefetch" href="https://github.com">
  
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d4a574">
</head>
<body>
  <div class="navbar">
    <h1><a href="/">📚 我的书架</a></h1>
    <nav>
      <a href="/authors.html" title="作者要求">作者要求</a>
      <a href="https://github.com/xingzihai/novel-site" target="_blank" rel="noopener" title="GitHub">GitHub</a>
      <a href="/admin.html" id="nav-admin">管理</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </nav>
  </div>
  <div class="container">
    <div id="continue-reading"></div>
    <div id="reading-stats"></div>
    <div id="tag-filter"></div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索书名或作者..." autocomplete="off">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div id="search-results" class="search-results" style="display:none"></div>
    <div id="content" class="loading">加载中...</div>
  </div>
  <footer style="text-align:center;padding:24px 16px;font-size:13px;color:var(--text-light);border-top:1px solid var(--border);margin-top:32px">
    <span id="footer-text"></span>
    <span style="margin:0 8px">·</span>
    <a href="/copyright.html" style="color:var(--text-light);text-decoration:none">版权声明</a>
    <span style="margin:0 8px">·</span>
    <a href="/authors.html" style="color:var(--text-light);text-decoration:none">作者要求</a>
  </footer>
  <script>
    // 主题
    const THEMES = ['light','dark','green','sepia','blue'];
    const THEME_ICONS = {'light':'🌙','dark':'☀️','green':'🍃','sepia':'📜','blue':'💧'};
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeBtn();
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const idx = THEMES.indexOf(current);
      const next = THEMES[(idx + 1) % THEMES.length];
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeBtn();
    }
    function updateThemeBtn() {
      const btn = document.querySelector('.theme-toggle');
      const t = document.documentElement.getAttribute('data-theme');
      btn.textContent = THEME_ICONS[t] || '🌙';
    }

    // 用户状态：登录后替换"管理"为角色+用户名
    (async function renderUserStatus() {
      const adminLink = document.getElementById('nav-admin');
      try {
        const res = await fetch('/api/me', { credentials: 'same-origin' });
        if (res.ok) {
          const user = await res.json();
          const roleMap = {
            'super_admin': { label: '超管', cls: 'super' },
            'admin': { label: '管理', cls: 'admin' },
            'demo': { label: '用户', cls: 'demo' }
          };
          const r = roleMap[user.role] || { label: '用户', cls: 'demo' };
          // 使用 textContent 安全地设置用户名，防止 XSS
          const badge = document.createElement('span');
          badge.className = 'role-badge ' + r.cls;
          badge.textContent = r.label;
          adminLink.textContent = '';
          adminLink.appendChild(badge);
          adminLink.appendChild(document.createTextNode(' ' + (user.username || '') + ' '));
          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.style.cssText = 'font-size:12px;color:#e74c3c;margin-left:6px';
          logoutLink.textContent = '退出';
          logoutLink.onclick = function() { doLogout(); return false; };
          adminLink.appendChild(logoutLink);
        }
      } catch {}
    })();

    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }); } catch {}
      location.reload();
    }

    // 继续阅读
    function renderContinueReading() {
      const container = document.getElementById('continue-reading');
      const entries = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith('reading_')) continue;
        try {
          const data = JSON.parse(localStorage.getItem(key));
          if (data && data.chapterId && data.time) entries.push(data);
        } catch {}
      }
      if (entries.length === 0) { container.innerHTML = ''; return; }
      entries.sort((a, b) => b.time - a.time);
      const latest = entries[0];
      const timeAgo = formatTimeAgo(latest.time);
      container.innerHTML = `
        <a class="continue-reading" href="/read.html?id=${latest.chapterId}">
          <div class="continue-info">
            <div class="continue-label">继续阅读</div>
            <div class="continue-title">${esc(latest.bookTitle || '未知书籍')}</div>
            <div class="continue-chapter">${esc(latest.chapterTitle || '')} · ${timeAgo}</div>
          </div>
          <div class="continue-arrow">→</div>
        </a>
      `;
    }
    function renderReadingStats() {
      const container = document.getElementById('reading-stats');
      try {
        const stats = JSON.parse(localStorage.getItem('readingStats'));
        if (!stats || (stats.totalSeconds === 0 && stats.totalChars === 0)) {
          container.innerHTML = '';
          return;
        }
        const hours = (stats.totalSeconds / 3600).toFixed(1);
        const wanChars = (stats.totalChars / 10000).toFixed(1);
        const days = (stats.days || []).length;
        container.innerHTML = `<div style="text-align:center;padding:8px 0;font-size:13px;color:var(--text-light)">已读 ${hours} 小时 · ${wanChars} 万字 · 累计 ${days} 天</div>`;
      } catch {
        container.innerHTML = '';
      }
    }
    function formatTimeAgo(ts) {
      const diff = Date.now() - ts;
      const min = Math.floor(diff / 60000);
      if (min < 1) return '刚刚';
      if (min < 60) return min + '分钟前';
      const hr = Math.floor(min / 60);
      if (hr < 24) return hr + '小时前';
      const day = Math.floor(hr / 24);
      return day + '天前';
    }

    // 搜索
    let allBooks = [];
    let allTags = [];
    let activeTagId = null;

    function doSearch() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const resultsEl = document.getElementById('search-results');
      const contentEl = document.getElementById('content');
      if (!q) {
        resultsEl.style.display = 'none';
        contentEl.style.display = '';
        return;
      }
      const matched = allBooks.filter(b =>
        (b.title || '').toLowerCase().includes(q) ||
        (b.author || '').toLowerCase().includes(q)
      );
      if (matched.length === 0) {
        resultsEl.innerHTML = '<div style="padding:16px;color:var(--text-light);text-align:center">没有找到匹配的书籍</div>';
      } else {
        resultsEl.innerHTML = matched.map(b => `
          <a class="result-item" href="/book.html?id=${b.id}">
            <div class="result-title">${highlightMatch(esc(b.title), q)}</div>
            <div class="result-book">${b.author ? highlightMatch(esc(b.author), q) + ' · ' : ''}${b.chapter_count}章 · ${formatWords(b.total_words)}</div>
          </a>
        `).join('');
      }
      resultsEl.style.display = '';
      contentEl.style.display = 'none';
    }
    function highlightMatch(text, q) {
      if (!q) return text;
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }
    // 搜索防抖定时器
    let searchDebounceTimer = null;
    const SEARCH_DEBOUNCE_MS = 300; // 防抖时间300ms，平衡响应速度和性能

    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        // 回车键立即搜索，清除防抖
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        doSearch();
      }
    });
    document.getElementById('search-input').addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (!query) {
        // 清空时立即隐藏结果
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('content').style.display = '';
        return;
      }
      // 防抖搜索：300ms后自动执行
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(doSearch, SEARCH_DEBOUNCE_MS);
    });

    async function loadBooks() {
      const el = document.getElementById('content');
      try {
        const [booksRes, tagsRes] = await Promise.all([
          fetch('/api/books'),
          fetch('/api/tags').catch(() => ({ json: () => ({ tags: [] }) }))
        ]);
        const booksData = await booksRes.json();
        if (!booksRes.ok) throw new Error('加载失败');
        allBooks = booksData.books || [];

        try { allTags = (await tagsRes.json()).tags || []; } catch { allTags = []; }
        renderTagFilter();

        renderContinueReading();
        renderReadingStats();
        renderBooks(allBooks);
      } catch (e) {
        el.innerHTML = `<div class="msg msg-error">加载失败：${esc(e.message)}</div>`;
      }
    }

    function renderTagFilter() {
      const container = document.getElementById('tag-filter');
      if (allTags.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = '<div class="tag-filter-bar" id="tag-bar"></div>';
      const bar = document.getElementById('tag-bar');
      const allPill = document.createElement('span');
      allPill.className = 'tag-pill' + (activeTagId === null ? ' active' : '');
      allPill.textContent = '全部';
      allPill.style.background = 'var(--bg)'; allPill.style.color = 'var(--text)';
      allPill.style.border = '1px solid var(--border)';
      bar.appendChild(allPill);
      for (const tag of allTags) {
        const pill = document.createElement('span');
        pill.className = 'tag-pill' + (activeTagId === tag.id ? ' active' : '');
        pill.textContent = tag.name;
        pill.style.background = tag.color + '22'; pill.style.color = tag.color;
        pill.dataset.tagId = tag.id;
        bar.appendChild(pill);
      }
      bar.addEventListener('click', (e) => {
        const pill = e.target.closest('.tag-pill');
        if (!pill) return;
        const tagId = pill.dataset.tagId ? Number(pill.dataset.tagId) : null;
        activeTagId = tagId;
        renderTagFilter();
        filterAndRenderBooks();
      });
    }

    function filterAndRenderBooks() {
      let filtered = allBooks;
      if (activeTagId !== null) {
        filtered = allBooks.filter(b => (b.tags || []).some(t => t.id === activeTagId));
      }
      renderBooks(filtered);
    }

    // 封面颜色生成
    const COVER_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'];
    function coverColor(title) { let h = 0; for (let i = 0; i < (title||'').length; i++) h = ((h << 5) - h + title.charCodeAt(i)) | 0; return COVER_COLORS[Math.abs(h) % COVER_COLORS.length]; }

    function renderBooks(books) {
      const el = document.getElementById('content');
      if (books.length === 0) {
        if (allBooks.length === 0) {
          el.className = '';
          el.innerHTML = '<div class="empty"><p>📖 书架空空如也</p><p>去<a href="/admin.html">管理后台</a>添加第一本书吧</p></div>';
        } else {
          el.className = '';
          el.innerHTML = '<div class="empty"><p>没有匹配的书籍</p></div>';
        }
        return;
      }
      el.className = 'book-grid-cover';
      el.innerHTML = books.map(b => {
        const tagsHtml = (b.tags || []).map(t => `<span class="tag-pill" style="background:${esc(t.color)}22;color:${esc(t.color)}">${esc(t.name)}</span>`).join('');
        if (b.cover_key) {
          return `<a class="book-card-cover" href="/book.html?id=${b.id}">
            <img class="cover-img" src="/api/covers/${b.id}" alt="${esc(b.title)}" loading="lazy">
            <div class="card-body">
              <h3>${esc(b.title)}</h3>
              <div class="meta">${b.author ? esc(b.author) + ' · ' : ''}${b.chapter_count}章</div>
              ${tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : ''}
            </div>
          </a>`;
        } else {
          const color = coverColor(b.title);
          const firstChar = (b.title || '?')[0];
          return `<a class="book-card-cover" href="/book.html?id=${b.id}">
            <div class="cover-placeholder" style="background:${color}">${esc(firstChar)}</div>
            <div class="card-body">
              <h3>${esc(b.title)}</h3>
              <div class="meta">${b.author ? esc(b.author) + ' · ' : ''}${b.chapter_count}章</div>
              ${tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : ''}
            </div>
          </a>`;
        }
      }).join('');
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function formatWords(n) {
      if (n >= 10000) return (n / 10000).toFixed(1) + ' 万字';
      return n + ' 字';
    }
    loadBooks();

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // 加载站点设置
    fetch('/api/settings').then(r => r.json()).then(d => {
      const s = d.settings || {};
      if (s.site_name) {
        document.title = s.site_name;
        document.querySelector('.navbar h1 a').textContent = '📚 ' + s.site_name;
        document.querySelector('meta[property="og:title"]').content = s.site_name;
      }
      if (s.site_desc) {
        document.querySelector('meta[name="description"]').content = s.site_desc;
        document.querySelector('meta[property="og:description"]').content = s.site_desc;
      }
      // 页脚
      if (s.footer_text) {
        document.getElementById('footer-text').textContent = s.footer_text;
      }
    }).catch(() => {});
  </script>
</body>
</html>
